spring.datasource.url=jdbc:h2:mem:petfinder_adopter_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

petfinder.clients.pet.base-url=http://localhost:8081
petfinder.clients.pet.connect-timeout-millis=3000
petfinder.clients.pet.response-timeout-millis=5000

petfinder.clients.match.base-url=http://localhost:8086
petfinder.clients.match.connect-timeout-millis=3000
petfinder.clients.match.response-timeout-millis=5000

petfinder.clients.notification.base-url=http://localhost:8084
petfinder.clients.notification.connect-timeout-millis=3000
petfinder.clients.notification.response-timeout-millis=5000
