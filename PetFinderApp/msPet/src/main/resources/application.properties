spring.application.name=msPet
server.port=8081

spring.main.web-application-type=servlet

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/petfinder_pet_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# External services
petfinder.clients.vet.base-url=http://localhost:8085
petfinder.clients.vet.connect-timeout-millis=3000
petfinder.clients.vet.response-timeout-millis=5000
